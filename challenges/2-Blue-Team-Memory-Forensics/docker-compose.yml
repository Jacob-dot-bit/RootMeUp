# =============================================================================
#  Blue Team CTF – Docker Compose
# =============================================================================

services:
  blue-team-challenge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueteam-memory-forensics
    stdin_open: true    # -i : garder stdin ouvert
    tty: true           # -t : allouer un pseudo-TTY
    volumes:
      # Le rapport est partagé avec l'hôte pour pouvoir le récupérer
      - ./report:/challenge/report
    # Pas de ports exposés : le challenge est 100% en CLI dans le conteneur
