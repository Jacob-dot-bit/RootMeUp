; -----------------------------------------------------------------------------
;  Orchestration du challenge Hardening
;  ttyd sert un terminal web (writable) qui ouvre une session 'analyst'.
; -----------------------------------------------------------------------------
[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
environment=PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

[program:ttyd]
; -W : terminal inscriptible ; le joueur arrive en session 'analyst' (sudo dispo)
command=/usr/local/bin/ttyd --writable --interface 0.0.0.0 --port 8000 /bin/su - analyst
autostart=true
autorestart=true
environment=PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",HOME="/root",TERM="xterm-256color"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
