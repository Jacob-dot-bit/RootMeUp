# =============================================================================
#  Blue Team CTF – Docker Compose (test local)
#  Boîte d'analyse SSH : le joueur se connecte via ssh.
#  En prod, le plugin CTFdDockerContainersPlugin alloue le port dynamiquement
#  (port interne du challenge dans CTFd = 22).
# =============================================================================

services:
  blue-team-challenge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blueteam-memory-forensics
    ports:
      - "2222:22"   # test local :  ssh analyst@127.0.0.1 -p 2222  (mot de passe : forensics)
    restart: unless-stopped
